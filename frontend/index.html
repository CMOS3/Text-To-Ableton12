<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Ableton</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Text-to-Ableton</h1>
            <div class="header-right">
                <button id="settings-btn" class="text-btn">⚙ Settings</button>
                <button id="clear-btn" class="text-btn">New Session</button>
                <div id="status-indicator" class="status-ready"><span class="status-dot"></span> Ready (Gemini 3.1 Pro)</div>
            </div>
        </header>

        <!-- Session Inspector -->
        <div id="session-inspector" class="session-inspector hidden">
            <div class="inspector-stats">
                <span id="inspector-bpm">BPM: --</span>
                <span id="inspector-key">Key: --</span>
                <span id="inspector-tracks">Tracks: --</span>
            </div>
            <button id="refresh-session-btn" class="text-btn">⟳ Refresh</button>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal-overlay hidden">
            <div class="modal-card">
                <h2>Settings</h2>
                <div class="input-group">
                    <label for="backend-url-input">Backend URL</label>
                    <input type="text" id="backend-url-input" placeholder="http://127.0.0.1:8000">
                </div>

                <div class="input-group">
                    <label for="genre-input">Current Genre/Style</label>
                    <input type="text" id="genre-input" placeholder="e.g. Melodic Techno, Lo-fi Hip Hop">
                </div>


                <div class="session-cost-manager">
                    <h3>Session Info & Cost</h3>
                    <div class="session-cost" style="display:flex; flex-direction:column; align-items:flex-start;">
                        <div>
                            <span class="cost-flash" id="cost-flash">Flash: $0.0000</span>
                            <span class="cost-pro" id="cost-pro" style="margin-left: 8px;">Pro: $0.0000</span>
                        </div>
                        <div style="font-size:0.85em; opacity:0.8; margin-top:4px;">
                            <span>History: </span>
                            <span class="history-flash" id="history-flash">Flash: $0.0000</span>
                            <span class="history-pro" id="history-pro" style="margin-left: 8px;">Pro: $0.0000</span>
                            <button id="reset-history-btn" class="text-btn" style="font-size:0.8em; padding:0; min-width:auto; margin-left:8px;">[Clear]</button>
                        </div>
                    </div>
                </div>

                <div class="input-group" style="flex-direction: row; align-items: center; gap: 0.5rem; margin-top: 1rem; margin-bottom: 2rem;">
                    <input type="checkbox" id="require-approval-toggle" checked style="width: auto;">
                    <label for="require-approval-toggle" style="margin: 0; cursor: pointer;">Require Action Approval</label>
                </div>

                <div class="modal-actions">
                    <button id="restart-app-btn" class="secondary-btn" style="margin-right: auto;">Restart App (Dev)</button>
                    <button id="settings-save-btn" class="primary-btn">Save</button>
                    <button id="settings-cancel-btn" class="secondary-btn">Cancel</button>
                </div>
            </div>
        </div>
        
        <main>
            <div id="chat-history" class="chat-history">
                <div class="message ai">
                    <div class="bubble">Hello! I'm your Ableton Assistant. How can I help you today?</div>
                </div>
            </div>
            <div class="chat-input-container">
                <textarea id="chat-input" rows="1" placeholder="Type a command... (Shift+Enter for new line)" autocomplete="off"></textarea>
                <button id="send-btn" class="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </main>
        
        <div id="log-drawer" class="log-drawer hidden">
            <div class="log-header">
                <span>Backend Logs</span>
            </div>
            <div id="log-content" class="log-content"></div>
        </div>
        
        <footer>
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <p>&copy; 2026 Text-to-Ableton Project</p>
                <button id="toggle-logs-btn" class="text-btn">Show Logs</button>
            </div>
        </footer>
    </div>
    <script src="libs/marked.min.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
